name: Continuous Deployment

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Render Deploy
        id: deploy_step
        run: |
          # El parámetro -f hace que curl falle si Render devuelve un error HTTP (ej. 404 o 500)
          curl -f -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Trigger Rollback on Failure
        # Esta condición se activa solo si el paso anterior falla
        if: failure()
        run: |
          echo "El despliegue falló. Iniciando rollback automático vía API de Render..."
          
          # 1. Obtiene el ID del commit del último despliegue que funcionó (status="live")
          LAST_SUCCESSFUL_COMMIT=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys \
            | jq -r '[.[] | select(.status=="live")][0].commit.id')

          echo "Revirtiendo al commit seguro: $LAST_SUCCESSFUL_COMMIT"

          # 2. Envía la orden a Render para redesplegar ese commit específico
          curl -X POST -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\": \"$LAST_SUCCESSFUL_COMMIT\"}" \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys