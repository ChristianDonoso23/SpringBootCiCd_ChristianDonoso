name: Rollback Deployment

on:
  workflow_dispatch: # Permite ejecutarlo manualmente si es necesario

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Get Last Successful Deploy and Rollback
        run: |
          # 1. Obtener el ID del último despliegue con estado 'live'
          LAST_SUCCESSFUL_COMMIT=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys \
            | jq -r '[.[] | select(.status=="live")][0].commit.id')

          echo "Revirtiendo al commit: $LAST_SUCCESSFUL_COMMIT"

          # 2. Disparar un nuevo despliegue con ese commit específico
          curl -X POST -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\": \"$LAST_SUCCESSFUL_COMMIT\"}" \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys