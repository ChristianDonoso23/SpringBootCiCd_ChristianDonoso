spring:
    datasource:
        url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
        driver-class-name: org.h2.Driver
        username: sa
        password: ""

    jpa:
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                # Esto es vital para que Hibernate sepa cómo trabajar con H2 en la nube
                dialect: org.hibernate.dialect.H2Dialect

    # Habilita esto para poder entrar a la consola desde el navegador en Render
    h2:
        console:
            enabled: true
            path: /h2-console

    sql:
        init:
            mode: never

# No olvides el puerto que configuramos en el Dockerfile
server:
    port: 8081

logging:
    level:
        root: warn